version: '3.8'

services:
  # Qdrant 向量数据库（存储 RAG 知识库的向量索引）
  qdrant:
    image: qdrant/qdrant:latest
    container_name: teaching-feedback-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC（Spring AI 实际连这个端口）
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Redis（对话记忆缓存）
  redis:
    image: redis:7-alpine
    container_name: teaching-feedback-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  qdrant_data:
